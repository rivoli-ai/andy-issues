services:
  postgres:
    image: postgres:16-alpine
    container_name: andy-issues-postgres
    environment:
      POSTGRES_DB: andy_issues
      POSTGRES_USER: andy_issues
      POSTGRES_PASSWORD: andy_issues_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5443:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andy_issues -d andy_issues"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - andy-issues-network

  # NATS JetStream broker for inter-service messaging (ADR 0001).
  # -js enables JetStream; -m 8222 exposes the HTTP monitoring endpoint
  # used by the healthcheck and for local observability.
  nats:
    image: nats:2-alpine
    container_name: andy-issues-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - andy-issues-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        certs: ./certs
    container_name: andy-issues-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8443;http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=andy_issues;Username=andy_issues;Password=andy_issues_dev_password
      - AndyAuth__Authority=https://host.docker.internal:5001
      - AndyAuth__Audience=urn:andy-issues-api
      - AndyAuth__RequireHttpsMetadata=false
      - Rbac__ApiBaseUrl=https://host.docker.internal:5003
      - Rbac__ApplicationCode=andy-issues
      - AndySettings__ApiBaseUrl=https://host.docker.internal:5300
      - AndySettings__ApplicationCode=andy-issues
      - Messaging__Provider=Nats
      - Messaging__Nats__Url=nats://nats:4222
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5410:8443"
      - "5411:8080"
    volumes:
      - ./certs:/usr/local/share/ca-certificates/custom:ro
      - dpkeys:/app/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - andy-issues-network

volumes:
  dpkeys:
  postgres_data:
  nats_data:

networks:
  andy-issues-network:
    driver: bridge
