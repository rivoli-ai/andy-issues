site_name: Andy Issues
site_description: Issues management service
repo_url: https://github.com/rivoli-ai/andy-issues

theme:
  name: material
  palette:
    primary: blue
    accent: blue

nav:
  - Home: index.md
  - Features: features.md
  - Architecture: architecture.md
  - Implementation: implementation.md
  - Testing: testing.md
  - Deployment: deployment.md
  - Security: security.md
  - ADRs:
      - 0001 — Messaging: adr/0001-messaging.md
      - 0002 — Triage belongs to andy-issues: adr/0002-triage-belongs-to-andy-issues.md

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
