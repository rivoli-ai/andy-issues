name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend
          path: '**/coverage.cobertura.xml'

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build -- --configuration production

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check formatting
        run: dotnet format --verify-no-changes

      - name: Guard removed code patterns
        run: |
          if grep -rn 'CodeAnalysis\|FileAnalysis\|VPSAnalysisService' \
               --include='*.cs' --include='*.ts' --include='*.html' \
               src/ tests/ tools/ client/src/; then
            echo "::error::Removed code patterns detected — code understanding lives in andy-code-index, see docs/architecture.md"
            exit 1
          fi
          if [ -d "client/src/app/features/code" ]; then
            echo "::error::features/code directory must not exist"
            exit 1
          fi

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test with SQLite provider
        run: dotnet test --no-build --verbosity normal
        env:
          Database__Provider: Sqlite

  integration-nats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Start NATS with JetStream
        run: |
          docker run --detach --name nats-js \
            --publish 4222:4222 \
            --publish 8222:8222 \
            nats:2-alpine -js -m 8222

          for _ in {1..30}; do
            if curl --fail --silent 'http://localhost:8222/healthz?js-enabled-only=true' > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs nats-js
          exit 1

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Integration tests (NATS)
        run: dotnet test tests/Andy.Issues.Tests.Integration --no-build --configuration Release --verbosity normal
        env:
          ANDY_ISSUES_TEST_NATS: 'true'
          NATS_URL: 'nats://localhost:4222'

      - name: NATS logs
        if: failure()
        run: docker logs nats-js

      - name: Stop NATS
        if: always()
        run: docker rm --force nats-js

  docker:
    needs: [build-backend, build-frontend, quality-gates, test-sqlite, integration-nats]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t andy-issues:${{ github.sha }} .
