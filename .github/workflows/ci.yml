name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: '**/coverage.cobertura.xml'

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build -- --configuration production

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check formatting
        run: dotnet format --verify-no-changes

      - name: Guard removed code patterns
        run: |
          if grep -rn 'CodeAnalysis\|FileAnalysis\|VPSAnalysisService' \
               --include='*.cs' --include='*.ts' --include='*.html' \
               src/ tests/ tools/ client/src/; then
            echo "::error::Removed code patterns detected — code understanding lives in andy-code-index, see docs/architecture.md"
            exit 1
          fi
          if [ -d "client/src/app/features/code" ]; then
            echo "::error::features/code directory must not exist"
            exit 1
          fi

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test with SQLite provider
        run: dotnet test --no-build --verbosity normal
        env:
          Database__Provider: Sqlite

  integration-nats:
    runs-on: ubuntu-latest
    # Sidecar NATS container with JetStream enabled. Port 4222 is the
    # broker, 8222 is the HTTP monitoring endpoint (unused by tests
    # themselves but handy for debugging flaky runs).
    services:
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "wget -qO- http://localhost:8222/healthz || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Integration tests (NATS)
        run: dotnet test tests/Andy.Issues.Tests.Integration --no-build --configuration Release --verbosity normal
        env:
          ANDY_ISSUES_TEST_NATS: 'true'
          # GitHub's `services:` exposes the container on localhost when
          # the job runs on the host runner (not in a container itself).
          NATS_URL: 'nats://localhost:4222'

  docker:
    needs: [build-backend, build-frontend, quality-gates, test-sqlite, integration-nats]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t andy-issues:${{ github.sha }} .
